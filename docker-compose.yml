services:
  ollama:
    image: ollama/ollama:0.32.0
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - p2mc-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "OLLAMA_HOST=127.0.0.1:11434 ollama list >/dev/null 2>&1"
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:${OLLAMA_VERSION:-0.32.0}
    environment:
      OLLAMA_HOST: ollama:11434
      QWEN_MODEL: ${QWEN_MODEL:-qwen2.5}
      LLAMA_MODEL: ${LLAMA_MODEL:-llama3.1:8b}
      GEMMA_MODEL: ${GEMMA_MODEL:-gemma4:e4b}
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu

        for model in \
          "$$QWEN_MODEL" \
          "$$LLAMA_MODEL" \
          "$$GEMMA_MODEL"
        do
          if ollama show "$$model" >/dev/null 2>&1; then
            echo "Modelo ya disponible: $$model"
          else
            echo "Descargando modelo: $$model"
            ollama pull "$$model"
          fi
        done

        echo "Todos los modelos de P2MC están disponibles."
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - p2mc-network
    restart: "no"

  grobid:
    image: grobid/grobid:0.9.0-full
    ports:
      - "127.0.0.1:8070:8070"
    networks:
      - p2mc-network
    restart: unless-stopped

